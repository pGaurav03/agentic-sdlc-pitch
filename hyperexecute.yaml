version: 0.1
globalTimeout: 180
testSuiteTimeout: 180
testSuiteStep: 180

runson: linux

autosplit: true
retryOnFailure: true
maxRetries: 1
concurrency: 5

# matrix: each browser gets its own parallel HyperExecute task
# 7 tests × 4 browsers = 28 fully independent parallel sessions
matrix:
  os: [linux]
  browser:
    - chrome
    - firefox
    - safari
    - android

env:
  LT_USERNAME:        ${LT_USERNAME}
  LT_ACCESS_KEY:      ${LT_ACCESS_KEY}
  GITHUB_RUN_NUMBER:  ${GITHUB_RUN_NUMBER}
  TARGET_URL:         "https://ecommerce-playground.lambdatest.io/"
  BROWSER:            ${matrix.browser}

cacheKey: '{{ checksum "requirements.txt" }}'
cacheDirectories:
  - .pip_cache
  - ~/.cache/ms-playwright

pre:
  - mkdir -p reports
  - pip install --cache-dir .pip_cache -r requirements.txt -q
  - playwright install chromium firefox webkit
  - python -c "import sys,json; sys.path.insert(0,'ci'); from pathlib import Path; from agent import generate_tests,write_test_selection,_validate_syntax; sc=json.loads(Path('scenarios/scenarios.json').read_text()); generate_tests(sc); _validate_syntax('tests/playwright/test_scenarios.py') or sys.exit(1); write_test_selection(sc); print(Path('reports/pytest_selection.txt').read_text())"

runtime:
  language: python
  version: "3.11"

testDiscovery:
  type: raw
  mode: dynamic
  command: cat reports/pytest_selection.txt

testRunnerCommand: >
  PYTHONPATH=. pytest "$test" -v --tb=short -s
  --html=reports/report_${matrix.browser}.html
  --junitxml=reports/junit_${matrix.browser}.xml

mergeArtifacts: true
uploadArtefacts:
  - name: TestReports
    path:
      - reports/

report: true
partialReports:
  type: json
  location: reports/
  frameworkName: extent

post:
  - echo "HyperExecute Agentic SDLC run complete"

jobLabel:
  - agentic-sdlc
  - lambdatest-pitch
  - playwright
  - multi-browser
