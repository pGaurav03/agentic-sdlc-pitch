---
version: "0.1"
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

runson: linux

autosplit: true
retryOnFailure: true
maxRetries: 1
concurrency: 5

env:
  TARGET_OS: "LINUX"
  BUILD: "Agentic SDLC | KaneAI Export"

cacheKey: '{{ checksum "requirements-he.txt" }}'
cacheDirectories:
  - CacheDir

pre:
  - pip3 install -r requirements-he.txt --cache-dir CacheDir
  - playwright install chromium

testDiscovery:
  type: raw
  mode: dynamic
  command: find tests/playwright/kane -name "test.py" | sort | sed 's|^|python |'

testRunnerCommand: $test

mergeArtifacts: true
uploadArtefacts:
  - name: TestReports
    path:
      - reports/

post:
  - echo "HyperExecute Agentic SDLC — KaneAI Export run complete"

jobLabel:
  - agentic-sdlc
  - lambdatest-pitch
  - kaneai
  - python
  - playwright
