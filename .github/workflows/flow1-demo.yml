name: "Flow 1 — Demo"

# ─────────────────────────────────────────────────────────────────────────────
# Instantly shows Flow 1 results from the last real pipeline run.
# No kane-cli, no HyperExecute — reads cached results and displays the
# traceability matrix + HE job links in the GitHub Step Summary.
#
# Triggers:
#   - Automatically after Flow 1 pipeline completes
#   - Manually via workflow_dispatch (for pitch demos)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Flow 1 — KaneAI Code Export"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Flow 1 run ID to pull results from (leave blank for latest)"
        required: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  demo:
    name: "Flow 1 · Demo — Live Traceability Matrix"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: pip install anthropic -q

      - name: Ensure reports directory
        run: mkdir -p reports

      - name: Download Flow 1 results (from workflow_run event)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: flow1-results-${{ github.event.workflow_run.run_number }}
          path: .
        continue-on-error: true

      - name: Download Flow 1 results (manual dispatch — latest run)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            # Find latest successful flow1 run
            RUN_ID=$(gh run list \
              --workflow flow1.yml \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
            echo "Latest Flow 1 run: $RUN_ID"
          fi
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --dir . --pattern "flow1-results-*" || true
            # Flatten nested artifact dir if present
            find . -name "demo_cache.json" -not -path "./reports/*" \
              -exec cp {} reports/demo_cache.json \; 2>/dev/null || true
            find . -name "traceability_matrix.md" -not -path "./reports/*" \
              -exec cp {} reports/traceability_matrix.md \; 2>/dev/null || true
          fi

      - name: Show traceability matrix
        run: python3 ci/demo.py

      - name: Write GitHub Step Summary
        if: always()
        run: |
          {
            echo "## Flow 1 — Live Traceability Matrix"
            echo ""
            echo "\`\`\`"
            python3 ci/demo.py 2>/dev/null || echo "No cached results found. Run Flow 1 first."
            echo "\`\`\`"
            echo ""
            if [ -f reports/traceability_matrix.md ]; then
              cat reports/traceability_matrix.md
            fi
          } >> $GITHUB_STEP_SUMMARY
