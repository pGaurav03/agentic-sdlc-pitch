name: "Flow 1 — KaneAI Code Export"

# ─────────────────────────────────────────────────────────────────────────────
# Flow 1: Requirements → Claude ACs → Claude Objectives → KaneAI (kane-cli)
#         → Playwright code export → HyperExecute → AI RCA → Traceability
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    paths:
      - "requirements/**"
      - "ci/**"
      - "hyperexecute.yaml"
      - ".github/workflows/flow1.yml"
  workflow_dispatch:
    inputs:
      requirements_url:
        description: "URL to requirements doc (Google Doc export, Notion, Dropbox, raw URL). Leave blank to use existing requirements/ files."
        required: false
        type: string
      from_step:
        description: "Start from step (1=analyze reqs, 2=gen objectives, 3=flow1 pipeline)"
        required: false
        default: "1"
        type: choice
        options: ["1", "2", "3"]

env:
  PYTHON_VERSION: "3.11"

# Cancel in-progress run if a newer push arrives
concurrency:
  group: flow1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flow1-pipeline:
    name: "Flow 1 · KaneAI → Code Export → HyperExecute"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install -r requirements.txt --cache-dir ~/.cache/pip -q

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Install kane-cli
        run: npm install -g @testmuai/kane-cli

      - name: Configure kane-cli
        env:
          LT_USERNAME:   ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          kane-cli login --username "$LT_USERNAME" --access-key "$LT_ACCESS_KEY"
          kane-cli install skill
          kane-cli config project ${{ secrets.KANE_PROJECT_ID }}
          kane-cli config folder  ${{ secrets.KANE_FOLDER_ID }}
          kane-cli whoami

      - name: Download HyperExecute CLI
        run: |
          curl -fsSL -O https://downloads.lambdatest.com/hyperexecute/linux/hyperexecute
          chmod +x hyperexecute
          ./hyperexecute --version

      - name: Ensure output directories
        run: mkdir -p reports logs requirements

      - name: "Download requirements doc from URL (if provided)"
        if: ${{ inputs.requirements_url != '' }}
        run: |
          URL="${{ inputs.requirements_url }}"
          echo "Downloading requirements from: $URL"

          # Convert Google Docs share URL → plain text export
          if echo "$URL" | grep -q "docs.google.com/document"; then
            DOC_ID=$(echo "$URL" | grep -oP '(?<=/d/)[^/]+')
            URL="https://docs.google.com/document/d/${DOC_ID}/export?format=txt"
            echo "Converted to Google Docs export URL"
          fi

          # Convert Notion public page → use as-is (HTML, Claude handles it)
          # Convert Dropbox share → direct download
          if echo "$URL" | grep -q "dropbox.com"; then
            URL=$(echo "$URL" | sed 's/?dl=0/?dl=1/g' | sed 's/&dl=0/\&dl=1/g')
          fi

          FILENAME="requirements/uploaded_$(date +%Y%m%d_%H%M%S).txt"
          curl -fsSL "$URL" -o "$FILENAME"
          echo "Saved to $FILENAME ($(wc -c < $FILENAME) bytes)"
          head -20 "$FILENAME"

      - name: "Step 1 — Analyze requirements (Claude)"
        if: ${{ inputs.from_step == '' || inputs.from_step <= '1' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 -u ci/analyze_requirements.py

      - name: "Step 2 — Generate kane-cli objectives (Claude)"
        if: ${{ inputs.from_step == '' || inputs.from_step <= '2' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 -u ci/generate_objectives.py

      - name: "Step 3 — Flow 1 pipeline (KaneAI → Code Export → HyperExecute)"
        env:
          LT_USERNAME:       ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY:     ${{ secrets.LT_ACCESS_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: python3 -u ci/flow1_pipeline.py

      - name: Write GitHub Step Summary
        if: always()
        run: |
          {
            echo "## Flow 1 — KaneAI Code Export Results"
            echo ""
            if [ -f reports/traceability_matrix.md ]; then
              cat reports/traceability_matrix.md
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow1-results-${{ github.run_number }}
          path: |
            reports/
            ci/objectives.json
            ci/run_history.json
            ci/he_jobs.json
            ci/rca_results.json
            logs/
          retention-days: 30
